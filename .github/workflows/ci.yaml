name: CI

on:
  push:
    paths-ignore:
      - "mlruns/**"
      - "outputs/**"
      - ".codex_tmp/**"
      - "mlflow.db"
      - "**/__pycache__/**"
  pull_request:
    paths-ignore:
      - "mlruns/**"
      - "outputs/**"
      - ".codex_tmp/**"
      - "mlflow.db"
      - "**/__pycache__/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Byte-compile source tree
        run: python -m compileall src

      - name: Import smoke
        run: python -c "import velodoc_train; print('import ok')"

      - name: Hydra config resolve
        run: python -m velodoc_train.cli --cfg job --resolve

      - name: Validation split smoke
        shell: bash
        run: |
          python - <<'PY'
          import json
          import tempfile
          from pathlib import Path

          from omegaconf import OmegaConf

          from velodoc_train.sft_train import _load_sft_datasets

          tmp_dir = Path(tempfile.mkdtemp(prefix="velodoc-ci-"))
          train_path = tmp_dir / "train.jsonl"
          rows = [
              {
                  "id": f"id-{idx}",
                  "source": "ci",
                  "prompt": f"prompt {idx}",
                  "completion": f"completion {idx}",
              }
              for idx in range(10)
          ]
          with train_path.open("w", encoding="utf-8") as handle:
              for row in rows:
                  handle.write(json.dumps(row) + "\n")

          cfg = OmegaConf.create(
              {
                  "run": {"seed": 123},
                  "dataset": {
                      "path": str(train_path),
                      "eval_path": "",
                      "validation": {
                          "strategy": "auto",
                          "split_ratio": 0.2,
                          "seed": 123,
                      },
                  },
              }
          )

          ds_train, ds_eval, eval_path, eval_source, split_meta = _load_sft_datasets(cfg)
          assert len(ds_train) == 8, len(ds_train)
          assert len(ds_eval) == 2, len(ds_eval)
          assert eval_path is None
          assert eval_source == "split"
          assert split_meta["split_ratio"] == 0.2
          assert split_meta["split_seed"] == 123
          print("validation split smoke ok")
          PY

      - name: Build package artifacts
        run: |
          python -m pip install build
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
